<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/student_login.png') }}">


    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit_profile.css') }}">
</head>
<body>
    <div class="bg-gradient"></div>
    <canvas id="particles"></canvas>
    
    <div class="profile-container">
        <h2>Edit Profile</h2>
        <div class="bg-gradient"></div>
    
    
        <form method="POST" action="{{ url_for('profile.update_profile') }}">
    
            <label>Roll Number</label>
            <input type="text" value="{{ student.roll }}" readonly>
            
            <!-- Name (Editable) -->
            <label>Name</label>
            <input type="text" name="name" value="{{ student.name }}" required>
            
            <!-- Department (Read-only) -->
            <label>Department</label>
            <input type="text" value="{{ student.department }}" readonly>
            
            <!-- Year (Read-only) -->
            <label>Year</label>
            <input type="number" value="{{ student.year }}" readonly>
            
            <!-- Email (Editable) -->
            <label>Email</label>
            <input type="email" name="email" value="{{ student.email }}" required>
            
            <div class="profile-actions">
                <button type="submit">Save Changes</button>
                <a href="{{ url_for('main.home') }}">Cancel</a>
            </div>
        </form>
    </div>
<script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        const particles = []; const particleCount = 70;
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 0.8 + 0.3; this.speedX = (Math.random() - 0.5) * 0.4; this.opacity = Math.random() * 0.5 + 0.2; }
            update() { this.y += this.speedY; this.x += this.speedX; if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) this.reset(); }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`; ctx.fill(); }
        }
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { ctx.beginPath(); ctx.strokeStyle = `rgba(0, 255, 204, ${0.15 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); connectParticles(); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
