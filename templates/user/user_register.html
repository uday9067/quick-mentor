<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Student Registration - QuickMentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="QuickMentor - Create your student account.">
    <meta name="theme-color" content="#050818">

    <link rel="icon" type="image/png" sizes="98x98" href="{{ url_for('static', filename='images/student_login.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
   
</head>

<body class="admin-body">
    <div class="bg-gradient"></div>
    <canvas id="particles"></canvas>
    <div class="admin-login-shell">
        <div class="admin-login-card">
            <h1>Create Account</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-area">
                {% for category, msg in messages %}
                <div class="flash {{ category }}">{{ msg }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="post" class="login-form">
                <label>Roll Number</label>
                <input type="text" name="roll" placeholder="Roll (e.g., 25101)" pattern="\d{5}""
                    title="Roll number must be exactly 5 digits (e.g., 25101)" required>
                <small style="color:#ffb3b3;">
                    ⚠️ Roll number is permanent and cannot be changed later. Please enter carefully.
                </small>


                <label>Name</label>
                <input type="text" name="name" required>

                <label>Department</label>
                <input type="text" name="department" required>

                <label>Year</label>
                <input type="number" name="year" min="1" max="4" required>

                <label>Email</label>
                <input type="email" name="email" required>

                <label>Password</label>
                <input type="password" name="password" required>

                <button type="submit">Register</button>
            </form>

            <a href="{{ url_for('user.user_login') }}" class="back-link">← Go to login</a>
        </div>
    </div>

    <script>
        // Auto hide flash messages after 3 seconds
        setTimeout(() => {
            document.querySelectorAll(".flash-message").forEach(msg => {
                msg.style.opacity = "0";
                msg.style.transform = "translateY(-10px)";
                setTimeout(() => msg.remove(), 300);
            });
        }, 3000);
</script>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        const particles = []; const particleCount = 70;
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 0.8 + 0.3; this.speedX = (Math.random() - 0.5) * 0.4; this.opacity = Math.random() * 0.5 + 0.2; }
            update() { this.y += this.speedY; this.x += this.speedX; if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) this.reset(); }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`; ctx.fill(); }
        }
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { ctx.beginPath(); ctx.strokeStyle = `rgba(0, 255, 204, ${0.15 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); connectParticles(); requestAnimationFrame(animate); }
        animate();
    </script>
</body>

</html>
