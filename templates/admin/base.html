<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/admin_dashboard.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body class="admin-body">
    <div class="bg-gradient"></div>
    <canvas id="particles"></canvas>

    <!-- ✅ SINGLE ADMIN NAVBAR -->
    <header class="admin-nav">
        <div class="nav-left">
            <span class="nav-logo-text">ADMIN PANEL</span>
        </div>
        <nav class="nav-links">
            <a href="{{ url_for('admin.admin_dashboard') }}" title="Overview">Overview</a>
            <a href="{{ url_for('admin.admin_students') }}" title="Students">Students</a>
            <a href="{{ url_for('admin.admin_timetable') }}" title="Timetable">Timetable</a>
            <a href="{{ url_for('admin.admin_fees') }}" title="Fees">Fees</a>
            <a href="{{ url_for('admin.admin_logout') }}" title="Logout">Logout</a>
        </nav>
    </header>

    <!-- ✅ PAGE CONTENT GOES HERE -->
    <main class="admin-main">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-area">
        {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    </main>

<script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        const particles = []; const particleCount = 70;
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 0.8 + 0.3; this.speedX = (Math.random() - 0.5) * 0.4; this.opacity = Math.random() * 0.5 + 0.2; }
            update() { this.y += this.speedY; this.x += this.speedX; if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) this.reset(); }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`; ctx.fill(); }
        }
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { ctx.beginPath(); ctx.strokeStyle = `rgba(0, 255, 204, ${0.15 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); connectParticles(); requestAnimationFrame(animate); }
        animate();
    </script>
</body>

</html>
