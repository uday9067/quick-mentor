<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description"
        content="Chat with QuickMentor - Your AI-powered academic assistant for attendance, fees, timetable, and more.">
    <meta name="theme-color" content="#050818">
    <title>QuickMentor – Chat</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/chat.png') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <style>
        /* ═══════════════════════════════════════════════
   QUICKMENTOR CHAT — PREMIUM REDESIGN
   Aesthetic: Dark neural-glass · Bioluminescent accents
   ═══════════════════════════════════════════════ */

        :root {
            /* Core palette */
            --ink: #05050f;
            --ink-soft: #0c0c1e;
            --ink-raised: #111128;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-md: rgba(255, 255, 255, 0.07);
            --glass-hi: rgba(255, 255, 255, 0.11);

            /* Neon accents */
            --cyan: #00e5cc;
            --violet: #7c5cfc;
            --rose: #ff4d8d;
            --amber: #ffb340;

            /* Gradients */
            --grad-primary: linear-gradient(135deg, var(--violet) 0%, var(--cyan) 100%);
            --grad-fire: linear-gradient(135deg, var(--rose) 0%, var(--amber) 100%);

            /* Text */
            --text-primary: #eef0fb;
            --text-secondary: #8b90b8;
            --text-muted: #4a5080;

            /* Border */
            --border: rgba(124, 92, 252, 0.18);
            --border-hi: rgba(0, 229, 204, 0.3);
            --border-glow: rgba(0, 229, 204, 0.12);

            /* Shadows */
            --shadow-card: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
            --shadow-msg: 0 4px 20px rgba(0, 0, 0, 0.35);

            /* Sizing */
            --nav-h: 68px;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --radius-pill: 999px;

            /* Transitions */
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --t-fast: 0.18s var(--ease-out);
            --t-med: 0.3s var(--ease-out);
        }

        /* ── Light mode overrides ── */
        body.light-mode {
            --ink: #f0f2fc;
            --ink-soft: #e8eaf6;
            --ink-raised: #ffffff;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-md: rgba(255, 255, 255, 0.75);
            --glass-hi: rgba(255, 255, 255, 0.9);
            --text-primary: #151530;
            --text-secondary: #4a4a7a;
            --text-muted: #888aaa;
            --border: rgba(124, 92, 252, 0.15);
            --shadow-card: 0 12px 48px rgba(100, 100, 180, 0.12), 0 0 0 1px var(--border);
        }

        /* ── Reset ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════════════════════════════
   IMMERSIVE BACKGROUND SYSTEM
   ══════════════════════════════════ */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* Deep space base */
        .bg-scene::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 60% at 10% 20%, rgba(124, 92, 252, 0.14) 0%, transparent 55%),
                radial-gradient(ellipse 70% 50% at 85% 75%, rgba(0, 229, 204, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 50% 110%, rgba(255, 77, 141, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #080814 0%, #05050f 100%);
            animation: nebula 25s ease-in-out infinite alternate;
        }

        @keyframes nebula {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            50% {
                opacity: .92;
            }

            100% {
                transform: scale(1.06) rotate(1.5deg);
                opacity: 1;
            }
        }

        /* Noise texture overlay */
        .bg-scene::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        /* Canvas particles */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: drift linear infinite;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            top: -120px;
            left: -80px;
            background: radial-gradient(circle, rgba(124, 92, 252, 0.2), transparent 70%);
            animation-duration: 40s;
        }

        .orb-2 {
            width: 320px;
            height: 320px;
            bottom: -80px;
            right: -60px;
            background: radial-gradient(circle, rgba(0, 229, 204, 0.15), transparent 70%);
            animation-duration: 32s;
            animation-direction: reverse;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            top: 40%;
            left: 60%;
            background: radial-gradient(circle, rgba(255, 77, 141, 0.1), transparent 70%);
            animation-duration: 48s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            25% {
                transform: translate(30px, -20px) rotate(90deg);
            }

            50% {
                transform: translate(-20px, 40px) rotate(180deg);
            }

            75% {
                transform: translate(40px, 20px) rotate(270deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        /* ══════════════════════════════════
   NAVBAR
   ══════════════════════════════════ */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: rgba(5, 5, 15, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        /* Shine line on nav bottom */
        .nav::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
            opacity: 0.4;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Animated logo mark */
        .nav-logo-mark {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(124, 92, 252, 0.5), 0 0 40px rgba(0, 229, 204, 0.15);
            position: relative;
            animation: logo-pulse 4s ease-in-out infinite;
        }

        @keyframes logo-pulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(124, 92, 252, 0.5), 0 0 40px rgba(0, 229, 204, 0.15);
            }

            50% {
                box-shadow: 0 0 28px rgba(124, 92, 252, 0.7), 0 0 60px rgba(0, 229, 204, 0.25);
            }
        }

        .nav-logo-mark::before {
            content: '⚡';
            font-size: 15px;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.8));
        }

        .nav-logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 0.02em;
            background: var(--grad-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a {
            position: relative;
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            transition: color var(--t-fast), background var(--t-fast);
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: var(--glass-md);
        }

        .nav-links a.active {
            color: var(--cyan);
            background: rgba(0, 229, 204, 0.08);
        }

        /* Icon buttons in nav */
        .nav-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: background var(--t-fast), border-color var(--t-fast), transform 0.15s var(--ease-spring);
        }

        .nav-icon-btn:hover {
            background: var(--glass-md);
            border-color: var(--border-hi);
            color: var(--text-primary);
            transform: scale(1.08);
        }

        #menu-toggle {
            display: none;
        }

        .nav-burger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
        }

        .nav-burger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: var(--t-fast);
        }

        /* ══════════════════════════════════
   CHAT SHELL
   ══════════════════════════════════ */
        .chat-shell {
            position: relative;
            z-index: 10;
            height: 100vh;
            padding: calc(var(--nav-h) + 14px) 16px 16px;
            display: flex;
            align-items: stretch;
            justify-content: center;
            width: 100%;
        }

        .chat-layout {
            display: flex;
            gap: 14px;
            width: 100%;
            max-width: 1300px;
            height: 100%;
        }

        /* ══════════════════════════════════
   SIDEBAR
   ══════════════════════════════════ */
        .chat-sidebar {
            width: 272px;
            flex-shrink: 0;
            background: rgba(8, 8, 22, 0.88);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideInLeft 0.5s var(--ease-out) forwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .sidebar-header {
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(124, 92, 252, 0.06), transparent);
        }

        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-title::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #new-chat-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 13px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(0, 229, 204, 0.25);
            background: rgba(0, 229, 204, 0.08);
            color: var(--cyan);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: var(--t-fast);
        }

        #new-chat-btn:hover {
            background: rgba(0, 229, 204, 0.15);
            border-color: rgba(0, 229, 204, 0.5);
            transform: scale(1.03);
            box-shadow: 0 0 16px rgba(0, 229, 204, 0.15);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .chat-list::-webkit-scrollbar {
            width: 3px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: rgba(124, 92, 252, 0.35);
            border-radius: 3px;
        }

        .chat-list-empty {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 32px 12px;
            line-height: 1.7;
        }

        .chat-list-empty::before {
            content: '🗨️';
            display: block;
            font-size: 28px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 1px solid transparent;
            gap: 6px;
            transition: background var(--t-fast), border-color var(--t-fast);
            position: relative;
            overflow: hidden;
        }

        .chat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--grad-primary);
            border-radius: 0 2px 2px 0;
            transform: scaleY(0);
            transition: transform var(--t-fast);
        }

        .chat-item:hover {
            background: var(--glass-md);
            border-color: var(--border);
        }

        .chat-item:hover::before {
            transform: scaleY(1);
        }

        .chat-item.active {
            background: rgba(124, 92, 252, 0.12);
            border-color: rgba(124, 92, 252, 0.3);
        }

        .chat-item.active::before {
            transform: scaleY(1);
        }

        .chat-item-icon {
            font-size: 13px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .chat-item-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
            transition: color var(--t-fast);
        }

        .chat-item:hover .chat-item-name,
        .chat-item.active .chat-item-name {
            color: var(--text-primary);
        }

        .chat-item.active .chat-item-name {
            color: #a89aff;
        }

        .chat-rename-btn,
        .chat-delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            padding: 3px 5px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity var(--t-fast), color var(--t-fast), background var(--t-fast);
            flex-shrink: 0;
        }

        .chat-item:hover .chat-rename-btn,
        .chat-item:hover .chat-delete-btn {
            opacity: 1;
        }

        .chat-rename-btn:hover {
            color: var(--cyan);
            background: rgba(0, 229, 204, 0.1);
        }

        .chat-delete-btn:hover {
            color: var(--rose);
            background: rgba(255, 77, 141, 0.1);
        }

        /* ══════════════════════════════════
   CHAT CARD
   ══════════════════════════════════ */
        .chat-card {
            flex: 1;
            background: rgba(8, 8, 22, 0.9);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: riseUp 0.6s var(--ease-out) forwards;
            position: relative;
        }

        @keyframes riseUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Top shimmer line */
        .chat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--violet) 30%, var(--cyan) 70%, transparent 100%);
            opacity: 0.6;
            z-index: 2;
        }

        /* ── Chat Header ── */
        .chat-header {
            padding: 18px 22px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(124, 92, 252, 0.06), transparent);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 0 2px rgba(124, 92, 252, 0.3), 0 8px 24px rgba(124, 92, 252, 0.3);
            position: relative;
            animation: avatar-glow 4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes avatar-glow {

            0%,
            100% {
                box-shadow: 0 0 0 2px rgba(124, 92, 252, 0.3), 0 8px 24px rgba(124, 92, 252, 0.3);
            }

            50% {
                box-shadow: 0 0 0 3px rgba(0, 229, 204, 0.4), 0 8px 32px rgba(124, 92, 252, 0.5);
            }
        }

        /* Status dot on avatar */
        .chat-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #080816;
            background: #00e676;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.8);
            animation: status-pulse 2.5s ease-in-out infinite;
        }

        @keyframes status-pulse {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(0, 230, 118, 0.8);
            }

            50% {
                box-shadow: 0 0 16px rgba(0, 230, 118, 1);
            }
        }

        .chat-header-info {}

        .chat-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .chat-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            line-height: 1.4;
        }

        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Model badge */
        .model-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: var(--radius-pill);
            background: rgba(124, 92, 252, 0.1);
            border: 1px solid rgba(124, 92, 252, 0.2);
            font-size: 11px;
            font-weight: 600;
            color: #a89aff;
            letter-spacing: 0.04em;
        }

        .model-badge::before {
            content: '◆';
            font-size: 8px;
            color: var(--violet);
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* ── Chat Box ── */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 5px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(124, 92, 252, 0.25);
            border-radius: 5px;
        }

        .chat-box::-webkit-scrollbar-thumb:hover {
            background: rgba(124, 92, 252, 0.45);
        }

        /* ── Messages ── */
        .message {
            max-width: 76%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.6;
            animation: msgIn 0.35s var(--ease-out) forwards;
            position: relative;
            white-space: pre-wrap;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* User message */
        .message.user {
            margin-left: auto;
            background: var(--grad-primary);
            color: #fff;
            border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
            box-shadow: 0 4px 20px rgba(124, 92, 252, 0.35), var(--shadow-msg);
        }

        /* Bot message */
        .message.bot {
            margin-right: auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
            backdrop-filter: blur(8px);
        }

        /* Message timestamp ghost */
        .message::after {
            display: none;
        }

        /* Rich text in bot messages */
        .message.bot strong {
            color: var(--cyan);
            font-weight: 600;
        }

        .message.bot em {
            color: #c0a8ff;
            font-style: italic;
        }

        .message.bot code {
            background: rgba(0, 229, 204, 0.1);
            border: 1px solid rgba(0, 229, 204, 0.2);
            padding: 1px 7px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            color: var(--cyan);
        }

        .message.bot ul {
            margin: 8px 0;
            padding-left: 18px;
        }

        .message.bot li {
            margin: 5px 0;
        }

        .message.bot .rich-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
            border-radius: 8px;
            overflow: hidden;
        }

        .message.bot .rich-table th,
        .message.bot .rich-table td {
            padding: 9px 14px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message.bot .rich-table th {
            background: rgba(124, 92, 252, 0.15);
            color: #a89aff;
            font-weight: 600;
        }

        .message.bot .rich-table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Typing bubble */
        .typing-bubble {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            max-width: fit-content;
        }

        .typing-bubble span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--grad-primary);
            animation: typingDot 1.2s ease-in-out infinite;
        }

        .typing-bubble span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-bubble span:nth-child(2) {
            animation-delay: 0.18s;
        }

        .typing-bubble span:nth-child(3) {
            animation-delay: 0.36s;
        }

        @keyframes typingDot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ── Input Area ── */
        .chat-input-area {
            padding: 14px 18px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(0deg, rgba(8, 8, 22, 0.95), transparent);
            flex-shrink: 0;
        }

        /* Helper chips */
        .quick-chips {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .chip {
            padding: 4px 11px;
            border-radius: var(--radius-pill);
            background: var(--glass);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--t-fast);
            white-space: nowrap;
        }

        .chip:hover {
            background: rgba(124, 92, 252, 0.12);
            border-color: rgba(124, 92, 252, 0.4);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .chat-input-row {
            display: flex;
            gap: 9px;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 7px 7px 7px 18px;
            transition: border-color var(--t-fast), box-shadow var(--t-fast);
            position: relative;
        }

        .chat-input-row:focus-within {
            border-color: rgba(124, 92, 252, 0.5);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.1), 0 8px 32px rgba(124, 92, 252, 0.15);
        }

        .chat-input-row input {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            min-width: 0;
        }

        .chat-input-row input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-row input.recording {
            color: #ff6b7a;
        }

        .chat-input-row input.recording::placeholder {
            color: rgba(255, 107, 122, 0.7);
            animation: placeholder-pulse 1s ease-in-out infinite;
        }

        @keyframes placeholder-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Action buttons in input */
        .input-btn {
            width: 36px;
            height: 36px;
            border-radius: 11px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: var(--t-fast);
            flex-shrink: 0;
        }

        .input-btn:hover {
            background: var(--glass-md);
            border-color: var(--border-hi);
            color: var(--text-primary);
            transform: scale(1.08);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #ff4d8d, #ff1f5a);
            border-color: #ff4d8d;
            color: white;
            animation: mic-pulse 1s ease-in-out infinite;
        }

        @keyframes mic-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 77, 141, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(255, 77, 141, 0);
            }
        }

        .speaker-btn.active {
            background: rgba(0, 229, 204, 0.1);
            border-color: rgba(0, 229, 204, 0.4);
            color: var(--cyan);
        }

        /* Attach label button */
        .attach-btn {
            width: 36px;
            height: 36px;
            border-radius: 11px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 15px;
            transition: var(--t-fast);
            flex-shrink: 0;
            text-decoration: none;
        }

        .attach-btn:hover {
            background: var(--glass-md);
            border-color: var(--border-hi);
            color: var(--text-primary);
            transform: scale(1.08);
        }

        .attach-icon {
            width: 16px;
            height: 16px;
            background-image: url("/static/images/attach.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.65;
        }

        .attach-btn:hover .attach-icon {
            opacity: 1;
        }

        /* Send button */
        #send-btn {
            height: 36px;
            padding: 0 20px;
            border-radius: 12px;
            border: none;
            background: var(--grad-primary);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(124, 92, 252, 0.4);
            transition: var(--t-fast);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        #send-btn::after {
            content: '↑';
            font-size: 15px;
            font-weight: 700;
        }

        #send-btn:hover {
            transform: translateY(-1px) scale(1.03);
            box-shadow: 0 4px 24px rgba(124, 92, 252, 0.6);
        }

        #send-btn:active {
            transform: scale(0.97);
        }

        #send-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            box-shadow: none;
        }

        /* Char counter hint */
        .input-hint {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
            margin-top: 7px;
        }

        .input-hint-text {
            font-size: 10.5px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .input-hint-text kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0 5px;
            height: 17px;
            font-size: 10px;
            font-family: inherit;
            color: var(--text-muted);
        }

        /* ══════════════════════════════════
   LIGHT MODE
   ══════════════════════════════════ */
        body.light-mode .bg-scene::before {
            background:
                radial-gradient(ellipse 90% 60% at 10% 20%, rgba(124, 92, 252, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse 70% 50% at 85% 75%, rgba(0, 229, 204, 0.05) 0%, transparent 50%),
                linear-gradient(160deg, #f0f2ff, #e8f4ff, #f5f0ff);
        }

        body.light-mode .nav {
            background: rgba(248, 249, 255, 0.88);
            border-bottom-color: rgba(124, 92, 252, 0.12);
        }

        body.light-mode .chat-card,
        body.light-mode .chat-sidebar {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(124, 92, 252, 0.12);
            box-shadow: 0 12px 48px rgba(100, 80, 200, 0.08), 0 0 0 1px rgba(124, 92, 252, 0.1);
        }

        body.light-mode .chat-header {
            border-bottom-color: rgba(0, 0, 0, 0.05);
        }

        body.light-mode .message.bot {
            background: rgba(124, 92, 252, 0.04);
            border-color: rgba(124, 92, 252, 0.1);
        }

        body.light-mode .chat-input-row {
            background: rgba(124, 92, 252, 0.04);
            border-color: rgba(124, 92, 252, 0.15);
        }

        body.light-mode .chat-input-row:focus-within {
            border-color: rgba(124, 92, 252, 0.4);
        }

        body.light-mode .input-btn,
        body.light-mode .attach-btn {
            background: rgba(124, 92, 252, 0.06);
            border-color: rgba(124, 92, 252, 0.15);
        }

        body.light-mode .chat-title {
            color: #1a1a35;
        }

        body.light-mode .chip {
            background: rgba(124, 92, 252, 0.06);
        }

        /* ══════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════ */
        @media (max-width: 768px) {
            .nav {
                padding: 0 16px;
            }

            #sidebar-toggle {
                display: flex !important;
            }

            .chat-sidebar {
                position: fixed;
                top: 0;
                left: -290px;
                width: 272px;
                height: 100vh;
                z-index: 200;
                border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
                transition: left 0.28s var(--ease-out);
            }

            .chat-sidebar.open {
                left: 0;
                box-shadow: 8px 0 48px rgba(0, 0, 0, 0.7);
            }

            .chat-layout {
                flex-direction: column;
            }

            .model-badge {
                display: none;
            }

            .quick-chips {
                display: none;
            }

            .message {
                max-width: 92%;
            }

            .chat-input-row {
                border-radius: 16px;
                padding: 6px 6px 6px 14px;
            }
        }

        @media (max-width: 480px) {
            .chat-shell {
                padding: calc(var(--nav-h) + 10px) 10px 10px;
            }

            .chat-card {
                border-radius: 18px;
            }

            .chat-box {
                padding: 14px;
            }

            .chat-header {
                padding: 14px 16px;
            }

            .chat-avatar {
                width: 38px;
                height: 38px;
                font-size: 17px;
                border-radius: 12px;
            }

            .chat-title {
                font-size: 15px;
            }

            #send-btn::after {
                display: none;
            }
        }

        /* ══════════════════════════════════
   UPLOADING STATE
   ══════════════════════════════════ */
        .message.uploading {
            opacity: 0.65;
            font-style: italic;
            animation: msgIn 0.35s var(--ease-out) forwards, uploading-pulse 1s ease-in-out infinite !important;
        }

        @keyframes uploading-pulse {

            0%,
            100% {
                opacity: 0.65;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ══════════════════════════════════
   SIDEBAR TOGGLE (hidden on desktop)
   ══════════════════════════════════ */
        #sidebar-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            transition: color var(--t-fast);
        }

        #sidebar-toggle:hover {
            color: var(--text-primary);
        }

        /* ══════════════════════════════════
   SCROLL FADE
   ══════════════════════════════════ */
        .chat-box.scrolled::before {
            content: '';
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, rgba(8, 8, 22, 0.9), transparent);
            pointer-events: none;
            display: block;
            margin-bottom: -40px;
            z-index: 5;
        }

        /* ══════════════════════════════════
   WELCOME MESSAGE STYLING
   ══════════════════════════════════ */
        .welcome-card {
            background: linear-gradient(135deg, rgba(124, 92, 252, 0.08), rgba(0, 229, 204, 0.05));
            border: 1px solid rgba(124, 92, 252, 0.2);
            border-radius: 18px;
            padding: 18px 20px;
            max-width: 480px;
            margin-right: auto;
            animation: msgIn 0.5s var(--ease-out) forwards;
        }

        .welcome-card .wc-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
            background: var(--grad-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card .wc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-top: 12px;
        }

        .wc-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--t-fast);
        }

        .wc-chip:hover {
            background: rgba(124, 92, 252, 0.1);
            border-color: rgba(124, 92, 252, 0.3);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .wc-chip .icon {
            font-size: 14px;
        }

        /* ══════════════════════════════════
   MENU TOGGLE (mobile burger)
   ══════════════════════════════════ */
        @media (max-width: 768px) {
            .nav-burger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: var(--nav-h);
                right: 14px;
                flex-direction: column;
                align-items: flex-start;
                background: rgba(8, 8, 22, 0.97);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 10px 6px;
                gap: 2px;
                backdrop-filter: blur(24px);
                transform-origin: top right;
                transform: scale(0.9);
                opacity: 0;
                pointer-events: none;
                transition: var(--t-fast);
                min-width: 180px;
            }

            #menu-toggle:checked~.nav-links {
                opacity: 1;
                pointer-events: auto;
                transform: scale(1);
            }

            .nav-links a {
                width: 100%;
                padding: 9px 14px;
            }
        }
    </style>
</head>

<body>
    <!-- Background scene -->
    <div class="bg-scene"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="particles"></canvas>

    <!-- ═══ NAVBAR ═══ -->
    <header class="nav">
        <div class="nav-left">
            <div class="nav-logo-mark"></div>
            <span class="nav-logo-text">QuickMentor</span>
        </div>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="nav-burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav-links">
            <button id="sidebar-toggle" class="nav-icon-btn" title="Toggle history">☰</button>
            <a href="/">Home</a>
            <a href="/chat" class="active">Chat</a>
            <button class="nav-icon-btn theme-toggle" id="theme-toggle" title="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </nav>
    </header>

    <!-- ═══ CHAT SHELL ═══ -->
    <main class="chat-shell">
        <div class="chat-layout">

            <!-- SIDEBAR -->
            <aside class="chat-sidebar" id="chat-sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Chats</span>
                    <button id="new-chat-btn">＋ New</button>
                </div>
                <div class="chat-list" id="chat-list">
                    <p class="chat-list-empty">No chats yet.<br>Click + New to start.</p>
                </div>
            </aside>

            <!-- CHAT CARD -->
            <section class="chat-card">

                <!-- Header -->
                <header class="chat-header">
                    <div class="chat-header-left">
                        <div class="chat-avatar">🤖</div>
                        <div class="chat-header-info">
                            <p class="chat-title" id="chat-title-label">QuickMentor</p>
                            <p class="chat-subtitle">AI Academic Assistant · Always ready ✨</p>
                        </div>
                    </div>
                    <div class="chat-header-right">
                        <div class="model-badge">AI Powered</div>
                    </div>
                </header>

                <!-- Messages -->
                <div id="chat-box" class="chat-box" aria-live="polite"></div>

                <!-- Input -->
                <div class="chat-input-area">
                    <div class="quick-chips" id="quick-chips">
                        <span class="chip" data-msg="Show my attendance">📊 Attendance</span>
                        <span class="chip" data-msg="Show fee details">💳 Fee Details</span>
                        <span class="chip" data-msg="Show timetable">📅 Timetable</span>
                        
                    </div>

                    <form id="chat-form" class="chat-input-row" autocomplete="off">
                        <input id="user-input" type="text"
                            placeholder="Ask anything… ( / to focus · Ctrl+↵ to send )" />

                        <button type="button" id="mic-btn" class="input-btn mic-btn"
                            title="Click to speak (Chrome only)">
                            🎤
                        </button>

                        <button type="button" id="speaker-btn" class="input-btn speaker-btn"
                            title="Toggle voice response">
                            <span class="speaker-icon">🔇</span>
                        </button>

                        <label class="attach-btn" title="Attach file">
                            <span class="attach-icon"></span>
                        </label>
                        <input type="file" id="file-input" hidden />

                        <button type="submit" id="send-btn">Send</button>
                    </form>

                    <div class="input-hint">
                        <span class="input-hint-text">
                            <kbd>/</kbd> focus · <kbd>Ctrl+↵</kbd> send · <kbd>Esc</kbd> clear
                        </span>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <!-- ═══ MAIN CHAT SCRIPT ═══ -->
    <script>
        const chatBox = document.getElementById("chat-box");
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const fileInput = document.getElementById("file-input");
        const sendBtn = document.getElementById("send-btn");
        const attachBtn = document.querySelector(".attach-btn");
        const chatListEl = document.getElementById("chat-list");
        const newChatBtn = document.getElementById("new-chat-btn");
        const chatTitleLabel = document.getElementById("chat-title-label");
        const sidebarEl = document.getElementById("chat-sidebar");
        const sidebarToggle = document.getElementById("sidebar-toggle");
        const quickChips = document.getElementById("quick-chips");

        let isWaitingForReply = false;
        let activeChatId = null;
        let voiceEnabled = localStorage.getItem("voiceEnabled") === "true";

        // ── Quick chips ──
        quickChips.querySelectorAll(".chip").forEach(chip => {
            chip.addEventListener("click", () => {
                const msg = chip.dataset.msg;
                if (msg) { userInput.value = msg; chatForm.dispatchEvent(new Event("submit")); }
            });
        });

        // ── Sidebar toggle ──
        sidebarToggle.addEventListener("click", (e) => {
            e.stopPropagation();
            sidebarEl.classList.toggle("open");
        });
        document.addEventListener("click", (e) => {
            if (!sidebarEl.contains(e.target) && e.target !== sidebarToggle)
                sidebarEl.classList.remove("open");
        });

        // ── File attach ──
        attachBtn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", () => {
            if (fileInput.files.length > 0) appendMessage(`📎 ${fileInput.files[0].name}`, "user");
        });

        // ── Keyboard shortcuts ──
        document.addEventListener("keydown", (e) => {
            if (e.key === "/" && document.activeElement !== userInput) { e.preventDefault(); userInput.focus(); }
            if (e.key === "Escape" && document.activeElement === userInput) { userInput.value = ""; userInput.blur(); }
            if (e.key === "Enter" && e.ctrlKey && document.activeElement === userInput) chatForm.dispatchEvent(new Event("submit"));
        });

        function scrollToBottom() {
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: "smooth" });
        }
        chatBox.addEventListener("scroll", () => chatBox.classList.toggle("scrolled", chatBox.scrollTop > 20));

        // ── Rich text parser ──
        function parseRichText(text) {
            if (!text) return "";
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const tableRegex = /\|(.+)\|\n\|([-:\s|]+)\|\n((?:\|.+\|\n?)+)/g;
            html = html.replace(tableRegex, (match, header, sep, body) => {
                const headers = header.split("|").map(h => h.trim()).filter(h => h);
                const rows = body.trim().split("\n").map(row => row.split("|").map(c => c.trim()).filter(c => c));
                let table = '<table class="rich-table">';
                table += '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
                table += '<tbody>' + rows.map(row => '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>').join('') + '</tbody></table>';
                return table;
            });
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>');
            const lines = html.split('\n');
            let inList = false;
            let parsedLines = lines.map(line => {
                if (/^[\-\•\*]\s/.test(line)) {
                    if (!inList) { inList = true; return '<ul>' + line.replace(/^[\-\•\*]\s/, '<li>') + '</li>'; }
                    return line.replace(/^[\-\•\*]\s/, '<li>') + '</li>';
                } else { if (inList) { inList = false; return '</ul>' + line; } return line; }
            }).join('\n');
            if (inList) parsedLines += '</ul>';
            return parsedLines.replace(/\n/g, '<br>');
        }

        function appendMessage(text, cls = "bot", isHtml = false) {
            const div = document.createElement("div");
            div.className = "message " + cls;
            if (isHtml || cls === "bot") div.innerHTML = parseRichText(text);
            else div.textContent = text;
            chatBox.appendChild(div);
            scrollToBottom();
            if (cls === "bot" && voiceEnabled) speakText(text.replace(/<[^>]*>/g, "").replace(/\|/g, " ").trim());
        }

        function showTyping() {
            const typing = document.createElement("div");
            typing.className = "message bot typing-bubble";
            typing.setAttribute("role", "status");
            typing.innerHTML = "<span></span><span></span><span></span>";
            chatBox.appendChild(typing);
            scrollToBottom();
            return typing;
        }

        function lockInput() {
            isWaitingForReply = true;
            sendBtn.disabled = true;
            userInput.disabled = true;
            attachBtn.style.pointerEvents = "none";
        }

        function unlockInput() {
            isWaitingForReply = false;
            sendBtn.disabled = false;
            userInput.disabled = false;
            attachBtn.style.pointerEvents = "auto";
            userInput.focus();
        }

        // ── Chat list ──
        async function loadChatList() {
            try {
                const res = await fetch("/api/chats");
                const chats = await res.json();
                renderChatList(chats);
            } catch (e) { console.error("Failed to load chats", e); }
        }

        function renderChatList(chats) {
            chatListEl.innerHTML = "";
            if (!chats.length) {
                chatListEl.innerHTML = '<p class="chat-list-empty">No chats yet.<br>Click + New to start.</p>';
                return;
            }
            chats.forEach(c => chatListEl.appendChild(buildChatItem(c)));
        }

        function buildChatItem(c) {
            const item = document.createElement("div");
            item.className = "chat-item" + (c.id === activeChatId ? " active" : "");
            item.dataset.id = c.id;
            item.innerHTML = `
                <span class="chat-item-icon">💬</span>
                <span class="chat-item-name" title="${c.name}">${c.name}</span>
                <button class="chat-rename-btn" title="Rename">✏️</button>
                <button class="chat-delete-btn" title="Delete">🗑</button>`;
            item.querySelector(".chat-item-name").addEventListener("click", () => selectChat(c.id, c.name));
            item.querySelector(".chat-rename-btn").addEventListener("click", (e) => { e.stopPropagation(); renameChat(c.id, c.name); });
            item.querySelector(".chat-delete-btn").addEventListener("click", (e) => { e.stopPropagation(); deleteChat(c.id); });
            return item;
        }

        async function selectChat(chatId, name) {
            activeChatId = chatId;
            chatTitleLabel.textContent = name;
            chatBox.innerHTML = "";
            document.querySelectorAll(".chat-item").forEach(el => el.classList.toggle("active", el.dataset.id === chatId));
            sidebarEl.classList.remove("open");
            try {
                const res = await fetch(`/api/chats/${chatId}/messages`);
                const msgs = await res.json();
                if (!msgs.length) {
                    appendMessage("Start the conversation below! 💬", "bot");
                } else {
                    msgs.forEach(m => appendMessage(m.content, m.isResponse ? "bot" : "user"));
                }
            } catch (e) { appendMessage("❌ Could not load history.", "bot"); }
        }

        async function createNewChat() {
            try {
                const res = await fetch("/api/chats", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: "New Chat" })
                });
                const chat = await res.json();
                activeChatId = chat.id;
                chatTitleLabel.textContent = chat.name;
                chatBox.innerHTML = "";
                appendMessage("👋 New chat started! Ask me anything.", "bot");
                await loadChatList();
            } catch (e) { console.error("Create chat failed", e); }
        }

        async function renameChat(chatId, oldName) {
            const newName = prompt("Rename chat:", oldName);
            if (!newName || newName.trim() === "" || newName === oldName) return;
            try {
                const res = await fetch(`/api/chats/${chatId}/rename`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: newName.trim() })
                });
                if (res.ok) {
                    if (activeChatId === chatId) chatTitleLabel.textContent = newName.trim();
                    await loadChatList();
                }
            } catch (e) { console.error("Rename failed", e); }
        }

        async function deleteChat(chatId) {
            if (!confirm("Delete this chat and all its messages?")) return;
            await fetch(`/api/chats/${chatId}`, { method: "DELETE" });
            if (activeChatId === chatId) {
                activeChatId = null;
                chatTitleLabel.textContent = "QuickMentor";
                chatBox.innerHTML = "";
                showWelcome();
            }
            await loadChatList();
        }

        newChatBtn.addEventListener("click", createNewChat);

        // ── Form submit ──
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            const file = fileInput.files[0];
            if (isWaitingForReply || (!msg && !file)) return;

            if (file) {
                lockInput();
                const status = document.createElement("div");
                status.className = "message bot uploading";
                status.textContent = "⏳ Uploading file…";
                chatBox.appendChild(status); scrollToBottom();
                const formData = new FormData();
                formData.append("file", file);
                if (activeChatId) formData.append("chatId", activeChatId);
                try {
                    const res = await fetch("/get_response", { method: "POST", body: formData });
                    const data = await res.json();
                    status.remove();
                    appendMessage(data.reply || "📎 File uploaded successfully.", "bot");
                    if (data.chatId) {
                        const wasFirstMsg = !activeChatId;
                        activeChatId = data.chatId;
                        if (chatTitleLabel.textContent === "New Chat" || wasFirstMsg) {
                            setTimeout(async () => {
                                await loadChatList();
                                const chatItem = document.querySelector(`.chat-item[data-id="${activeChatId}"] .chat-item-name`);
                                if (chatItem) chatTitleLabel.textContent = chatItem.textContent;
                            }, 500);
                        }
                    }
                } catch { status.remove(); appendMessage("❌ File upload failed.", "bot"); }
                unlockInput();
                fileInput.value = ""; userInput.value = "";
                return;
            }

            lockInput();
            appendMessage(msg, "user");
            userInput.value = "";
            const typing = showTyping();
            const formData = new FormData();
            formData.append("message", msg);
            if (activeChatId) formData.append("chatId", activeChatId);

            try {
                const res = await fetch("/get_response", { method: "POST", body: formData });
                const data = await res.json();
                typing.remove();
                appendMessage(data.reply || "No response.", "bot");
                if (data.chatId) {
                    const wasFirstMsg = !activeChatId;
                    activeChatId = data.chatId;
                    if (chatTitleLabel.textContent === "New Chat" || wasFirstMsg) {
                        setTimeout(async () => {
                            await loadChatList();
                            const chatItem = document.querySelector(`.chat-item[data-id="${activeChatId}"] .chat-item-name`);
                            if (chatItem) chatTitleLabel.textContent = chatItem.textContent;
                        }, 500);
                    }
                }
            } catch { typing.remove(); appendMessage("❌ Error contacting server.", "bot"); }

            unlockInput();
            fileInput.value = "";
        });

        // ── Welcome card ──
        function showWelcome() {
            const wrap = document.createElement("div");
            wrap.className = "welcome-card";
            wrap.innerHTML = `
                <div class="wc-title">👋 Hey, I'm QuickMentor!</div>
                <div style="font-size:13px; color: var(--text-secondary); line-height:1.7">
                    Your AI-powered academic companion. Ask me anything about your studies, schedules, or fees.
                </div>
                <div class="wc-grid">
                    <div class="wc-chip" data-msg="Show my attendance">
                        <span class="icon">📊</span> Attendance
                    </div>
                    <div class="wc-chip" data-msg="Show fee details">
                        <span class="icon">💳</span> Fees
                    </div>
                    <div class="wc-chip" data-msg="Show timetable">
                        <span class="icon">📅</span> Timetable
                    </div>
                    
                </div>`;
            // Attach chip click handlers
            wrap.querySelectorAll(".wc-chip").forEach(chip => {
                chip.addEventListener("click", () => {
                    const msg = chip.dataset.msg;
                    if (msg) { userInput.value = msg; chatForm.dispatchEvent(new Event("submit")); }
                });
            });
            chatBox.appendChild(wrap);
            scrollToBottom();
        }

        // Init
        showWelcome();
        loadChatList();
    </script>

    <!-- ═══ PARTICLES ═══ -->
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);

        const particles = [];
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 1.8 + 0.4;
                this.speedY = -(Math.random() * 0.6 + 0.2);
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.hue = Math.random() > 0.5 ? 270 : 175; // violet or cyan
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) {
            const p = new Particle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 110) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(124,92,252, ${0.08 * (1 - dist / 110)})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            connectParticles();
            requestAnimationFrame(animate);
        }
        animate();
    </script>

    <!-- ═══ VOICE ═══ -->
    <script>
        const micBtn = document.getElementById("mic-btn");
        const speakerBtn = document.getElementById("speaker-btn");
        let isRecording = false;
        let recognition = null;
        let finalTranscript = "";

        if (voiceEnabled) {
            speakerBtn.classList.add("active");
            speakerBtn.querySelector(".speaker-icon").textContent = "🔊";
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = "en-US";
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRecording = true; finalTranscript = "";
                micBtn.classList.add("recording");
                userInput.classList.add("recording");
                userInput.placeholder = "Listening… speak now 🎤";
                userInput.value = ""; userInput.focus();
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove("recording");
                userInput.classList.remove("recording");
                userInput.placeholder = "Ask anything… ( / to focus · Ctrl+↵ to send )";
                const transcript = userInput.value.trim();
                if (transcript.length > 0) chatForm.dispatchEvent(new Event("submit"));
            };

            recognition.onresult = (event) => {
                let transcript = ""; let isFinal = false;
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                    if (event.results[i].isFinal) isFinal = true;
                }
                userInput.value = transcript;
                if (isFinal) { finalTranscript = transcript; recognition.stop(); }
            };

            recognition.onerror = (event) => {
                micBtn.classList.remove("recording");
                userInput.placeholder = event.error === "not-allowed"
                    ? "Mic permission denied!"
                    : event.error === "no-speech" ? "No speech detected." : "Ask anything…";
                setTimeout(() => { userInput.placeholder = "Ask anything… ( / to focus · Ctrl+↵ to send )"; }, 2200);
            };

            micBtn.addEventListener("click", () => {
                if (isRecording) recognition.stop();
                else try { recognition.start(); } catch (e) { console.error(e); }
            });
        } else {
            micBtn.style.opacity = "0.35";
            micBtn.style.pointerEvents = "none";
            micBtn.title = "Voice input not supported — use Chrome";
        }

        speakerBtn.addEventListener("click", () => {
            voiceEnabled = !voiceEnabled;
            speakerBtn.classList.toggle("active", voiceEnabled);
            speakerBtn.querySelector(".speaker-icon").textContent = voiceEnabled ? "🔊" : "🔇";
            localStorage.setItem("voiceEnabled", voiceEnabled);
        });

        function speakText(text) {
            if (!voiceEnabled) return;
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US"; utterance.rate = 1; utterance.pitch = 1;
            const voices = speechSynthesis.getVoices();
            const voice = voices.find(v => v.lang.startsWith("en") && v.name.includes("Google")) || voices.find(v => v.lang.startsWith("en"));
            if (voice) utterance.voice = voice;
            speechSynthesis.speak(utterance);
        }
    </script>

    <!-- ═══ THEME ═══ -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('.theme-icon');
        const themes = ['dark', 'light', 'system'];
        const icons = { dark: '🌙', light: '☀️', system: '💻' };

        function setTheme(theme) {
            document.body.classList.remove('light-mode', 'system-mode');
            if (theme === 'light') document.body.classList.add('light-mode');
            else if (theme === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches)
                document.body.classList.add('light-mode');
            themeIcon.textContent = icons[theme];
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const current = localStorage.getItem('theme') || 'dark';
            setTheme(themes[(themes.indexOf(current) + 1) % themes.length]);
        });
    </script>
