<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Chat with QuickMentor - Your AI-powered academic assistant for attendance, fees, timetable, and more.">
    <meta name="theme-color" content="#050818">
    <title>QuickMentor – Chat</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/chat.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>

<body>

    <div class="bg-gradient"></div>
    <canvas id="particles"></canvas>

    <!-- NAVBAR -->
    <header class="nav">
        <div class="nav-left">
            <div class="nav-logo-circle"></div>
            <span class="nav-logo-text">QuickMentor</span>
        </div>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="nav-burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/chat">Chatbot</a>
            <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </nav>
    </header>

    <!-- CHAT -->
    <main class="chat-shell">
        <section class="chat-card">

            <header class="chat-header">
                <div>
                    <p class="chat-title">QuickMentor</p>
                    <p class="chat-subtitle">
                        Have a question? Just ask ✨<br>
                        I’m here to help with academics and more.
                    </p>
                </div>

                <div class="chat-status">
                    <span class="dot"></span>
                    <span>Online</span>
                </div>
            </header>

            <!-- CHAT BOX -->
            <div id="chat-box" class="chat-box" aria-live="polite"></div>

            <!-- INPUT ROW -->
            <form id="chat-form" class="chat-input-row" autocomplete="off">
                <input id="user-input" type="text" placeholder="Ask anything... (Press / to focus, Ctrl+Enter to send)" />

                <!-- 📎 ATTACH FILE -->
            <label class="attach-btn" title="Attach file">
                <span class="attach-icon"></span>
            </label>
            <input type="file" id="file-input" hidden />



                <button type="submit">Send</button>
            </form>

        </section>
    </main>

    <script>
        const chatBox = document.getElementById("chat-box");
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const fileInput = document.getElementById("file-input");
        const sendBtn = chatForm.querySelector("button");
        const attachBtn = document.querySelector(".attach-btn");
        let isWaitingForReply = false;
        document.querySelector(".attach-btn").addEventListener("click", () => {
                fileInput.click();
            });

        // ✅ Show file immediately after selecting (Open button)
            fileInput.addEventListener("change", () => {
                if (fileInput.files.length > 0) {
                    appendMessage(`📎 ${fileInput.files[0].name}`, "user");
                }
            });

        // Keyboard shortcuts
        document.addEventListener("keydown", (e) => {
            // "/" to focus chat input
            if (e.key === "/" && document.activeElement !== userInput) {
                e.preventDefault();
                userInput.focus();
            }
            // Escape to clear or close
            if (e.key === "Escape") {
                if (document.activeElement === userInput) {
                    userInput.value = "";
                    userInput.blur();
                }
            }
            // Ctrl+Enter to send (alternative)
            if (e.key === "Enter" && e.ctrlKey && document.activeElement === userInput) {
                chatForm.dispatchEvent(new Event("submit"));
            }
        });
    
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Scroll indicator
        chatBox.addEventListener("scroll", () => {
            const isScrolled = chatBox.scrollTop > 20;
            chatBox.classList.toggle("scrolled", isScrolled);
        });

        function parseRichText(text) {
            if (!text) return "";
            
            let html = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            
            // Tables: | Header | Header |\n| ---- | ---- |\n| Cell | Cell |
            const tableRegex = /\|(.+)\|\n\|([-:\s|]+)\|\n((?:\|.+\|\n?)+)/g;
            html = html.replace(tableRegex, (match, header, sep, body) => {
                const headers = header.split("|").map(h => h.trim()).filter(h => h);
                const rows = body.trim().split("\n").map(row => 
                    row.split("|").map(c => c.trim()).filter(c => c)
                );
                let table = '<table class="rich-table">';
                table += '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
                table += '<tbody>' + rows.map(row => 
                    '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>'
                ).join('') + '</tbody></table>';
                return table;
            });
            
            // Bold **text**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Italic *text*
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // Code `text`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Lists: lines starting with • or - or *
            const lines = html.split('\n');
            let inList = false;
            let parsedLines = lines.map(line => {
                if (/^[\-\•\*]\s/.test(line)) {
                    if (!inList) { inList = true; return '<ul>' + line.replace(/^[\-\•\*]\s/, '<li>') + '</li>'; }
                    return line.replace(/^[\-\•\*]\s/, '<li>') + '</li>';
                } else {
                    if (inList) { inList = false; return '</ul>' + line; }
                    return line;
                }
            }).join('\n');
            if (inList) parsedLines += '</ul>';
            html = parsedLines;
            
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        function appendMessage(text, cls = "bot", isHtml = false) {
            const div = document.createElement("div");
            div.className = "message " + cls;
            if (isHtml || cls === "bot") {
                div.innerHTML = parseRichText(text);
            } else {
                div.textContent = text;
            }
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const typing = document.createElement("div");
            typing.className = "message bot typing-bubble";
            typing.setAttribute("role", "status");
            typing.setAttribute("aria-label", "Typing");
            typing.innerHTML = "<span></span><span></span><span></span>";
            chatBox.appendChild(typing);
            scrollToBottom();
            return typing;
        }

        function lockInput() {
                isWaitingForReply = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                attachBtn.style.pointerEvents = "none";
                sendBtn.style.opacity = "0.6";
            }

            function unlockInput() {
                isWaitingForReply = false;
                sendBtn.disabled = false;
                userInput.disabled = false;
                attachBtn.style.pointerEvents = "auto";
                sendBtn.style.opacity = "1";
                userInput.focus();
            }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const msg = userInput.value.trim();
            const file = fileInput.files[0];


           

           if (isWaitingForReply || (!msg && !file)) return;


            /* -----------------------------
               FILE UPLOAD TAKES PRIORITY
            ----------------------------- */
            if (file) {
                lockInput();
                // ✅ Uploading indicator (VISIBLE)
                const status = document.createElement("div");
                status.className = "message bot uploading";
                status.textContent = "⏳ Uploading file…";
                chatBox.appendChild(status);
                scrollToBottom();

                const formData = new FormData();
                formData.append("file", file);

                try {
                    const res = await fetch("/get_response", {
                        method: "POST",
                        body: formData
                    });

                    const data = await res.json();

                    status.remove();
                    appendMessage(data.reply || "📎 File uploaded successfully.", "bot");
                    unlockInput();

                } catch (err) {
                    status.remove();
                    appendMessage("❌ File upload failed.", "bot");
                    unlockInput();
                }

                fileInput.value = "";
                userInput.value = "";
                return;
            }





            /* -----------------------------
               NORMAL TEXT MESSAGE
            ----------------------------- */
            lockInput();
            appendMessage(msg, "user");
            userInput.value = "";

            const typing = showTyping();

            const formData = new FormData();
            formData.append("message", msg);

            try {
                const res = await fetch("/get_response", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                typing.remove();
                appendMessage(data.reply || "No response.", "bot");
                unlockInput();

            } catch (err) {
                typing.remove();
                appendMessage("❌ Error contacting server.", "bot");
                unlockInput();
            }

            fileInput.value = "";
        });

        // Initial welcome message
        appendMessage(
            "👋 Hey there! I’m QuickMentor 🤖.\n\n" +
            "• Ask me about attendance, fees & timetable 📚\n" +
            "• type  '/activity'  - for recent activity 📝 \n" +
            "• Upload a document 📎\n" +
            "• Or just say hello 😄",
            "bot"
        );
    </script>

<script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        const particles = []; const particleCount = 70;
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 0.8 + 0.3; this.speedX = (Math.random() - 0.5) * 0.4; this.opacity = Math.random() * 0.5 + 0.2; }
            update() { this.y += this.speedY; this.x += this.speedX; if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) this.reset(); }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(124, 58, 237, ${this.opacity})`; ctx.fill(); }
        }
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { ctx.beginPath(); ctx.strokeStyle = `rgba(124, 58, 237, ${0.1 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); connectParticles(); requestAnimationFrame(animate); }
        animate();
    </script>
    <script>
const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('.theme-icon');
        const themes = ['light', 'system', 'dark'];
        const icons = { dark: '🌙', light: '☀️', system: '💻' };
        
        function setTheme(theme) {
            document.body.classList.remove('light-mode', 'system-mode');
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else if (theme === 'system') {
                if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                    document.body.classList.add('light-mode');
                }
            }
            themeIcon.textContent = icons[theme];
            localStorage.setItem('theme', theme);
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const current = localStorage.getItem('theme') || 'dark';
            const nextIndex = (themes.indexOf(current) + 1) % 3;
            setTheme(themes[nextIndex]);
        });
    </script>
</body>

</html>
