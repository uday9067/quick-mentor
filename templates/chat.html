<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Assistant – Chat</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/chat.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>

<body>

    <div class="bg-gradient"></div>
    <canvas id="particles"></canvas>

    <!-- NAVBAR -->
    <header class="nav">
        <div class="nav-left">
            <div class="nav-logo-circle"></div>
            <span class="nav-logo-text">Student Assistant</span>
        </div>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="nav-burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/chat">Chatbot</a>
        </nav>
    </header>

    <!-- CHAT -->
    <main class="chat-shell">
        <section class="chat-card">

            <header class="chat-header">
                <div>
                    <p class="chat-title">Student Assistant</p>
                    <p class="chat-subtitle">
                        Have a question? Just ask ✨<br>
                        I’m here to help with academics and more.
                    </p>
                </div>

                <div class="chat-status">
                    <span class="dot"></span>
                    <span>Online</span>
                </div>
            </header>

            <!-- CHAT BOX -->
            <div id="chat-box" class="chat-box" aria-live="polite"></div>

            <!-- INPUT ROW -->
            <form id="chat-form" class="chat-input-row" autocomplete="off">
                <input id="user-input" type="text" placeholder="Ask anything... e.g. Attendance, Fees, Timetable" />

                <!-- 📎 ATTACH FILE -->
            <label class="attach-btn" title="Attach file">
                <span class="attach-icon"></span>
            </label>
            <input type="file" id="file-input" hidden />



                <button type="submit">Send</button>
            </form>

        </section>
    </main>

    <script>
        const chatBox = document.getElementById("chat-box");
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const fileInput = document.getElementById("file-input");
        const sendBtn = chatForm.querySelector("button");
        const attachBtn = document.querySelector(".attach-btn");
        let isWaitingForReply = false;
        document.querySelector(".attach-btn").addEventListener("click", () => {
                fileInput.click();
            });

        // ✅ Show file immediately after selecting (Open button)
            fileInput.addEventListener("change", () => {
                if (fileInput.files.length > 0) {
                    appendMessage(`📎 ${fileInput.files[0].name}`, "user");
                }
            });
    
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(text, cls = "bot") {
            const div = document.createElement("div");
            div.className = "message " + cls;
            div.textContent = text;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const typing = document.createElement("div");
            typing.className = "message bot typing-bubble";
            typing.innerHTML = "<span></span><span></span><span></span>";
            chatBox.appendChild(typing);
            scrollToBottom();
            return typing;
        }

        function lockInput() {
                isWaitingForReply = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                attachBtn.style.pointerEvents = "none";
                sendBtn.style.opacity = "0.6";
            }

            function unlockInput() {
                isWaitingForReply = false;
                sendBtn.disabled = false;
                userInput.disabled = false;
                attachBtn.style.pointerEvents = "auto";
                sendBtn.style.opacity = "1";
                userInput.focus();
            }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const msg = userInput.value.trim();
            const file = fileInput.files[0];


           

           if (isWaitingForReply || (!msg && !file)) return;


            /* -----------------------------
               FILE UPLOAD TAKES PRIORITY
            ----------------------------- */
            if (file) {
                lockInput();
                // ✅ Uploading indicator (VISIBLE)
                const status = document.createElement("div");
                status.className = "message bot uploading";
                status.textContent = "⏳ Uploading file…";
                chatBox.appendChild(status);
                scrollToBottom();

                const formData = new FormData();
                formData.append("file", file);

                try {
                    const res = await fetch("/get_response", {
                        method: "POST",
                        body: formData
                    });

                    const data = await res.json();

                    status.remove();
                    appendMessage(data.reply || "📎 File uploaded successfully.", "bot");
                    unlockInput();

                } catch (err) {
                    status.remove();
                    appendMessage("❌ File upload failed.", "bot");
                    unlockInput();
                }

                fileInput.value = "";
                userInput.value = "";
                return;
            }





            /* -----------------------------
               NORMAL TEXT MESSAGE
            ----------------------------- */
            lockInput();
            appendMessage(msg, "user");
            userInput.value = "";

            const typing = showTyping();

            const formData = new FormData();
            formData.append("message", msg);

            try {
                const res = await fetch("/get_response", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                typing.remove();
                appendMessage(data.reply || "No response.", "bot");
                unlockInput();

            } catch (err) {
                typing.remove();
                appendMessage("❌ Error contacting server.", "bot");
                unlockInput();
            }

            fileInput.value = "";
        });

        // Initial welcome message
        appendMessage(
            "👋 Hey there! I’m your Student Assistant 🤖.\n\n" +
            "• Ask me about attendance, fees & timetable 📚\n" +
            "• type  '/activity'  - for recent activity 📝 \n" +
            "• Upload a document 📎\n" +
            "• Or just say hello 😄",
            "bot"
        );
    </script>

<script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);
        const particles = []; const particleCount = 70;
        class Particle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { this.x = Math.random() * canvas.width; this.y = -10; this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 0.8 + 0.3; this.speedX = (Math.random() - 0.5) * 0.4; this.opacity = Math.random() * 0.5 + 0.2; }
            update() { this.y += this.speedY; this.x += this.speedX; if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) this.reset(); }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(0, 255, 204, ${this.opacity})`; ctx.fill(); }
        }
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { ctx.beginPath(); ctx.strokeStyle = `rgba(0, 255, 204, ${0.15 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            }
        }
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); connectParticles(); requestAnimationFrame(animate); }
        animate();
    </script>
</body>

</html>
